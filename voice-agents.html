  <script>
    // Force-mute every video element, always.
    (function () {
      function muteAll(){
        document.querySelectorAll('video').forEach(v => {
          v.muted = true;
          v.volume = 0;
          v.defaultMuted = true;
        });
      }
      muteAll();
      document.addEventListener('DOMContentLoaded', muteAll);
      window.addEventListener('load', muteAll);
      // Also re-apply when new videos are added (React mount)
      const mo = new MutationObserver(muteAll);
      document.addEventListener('DOMContentLoaded', () => mo.observe(document.body, {childList: true, subtree: true}));
    })();
